<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBU Metrics</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 24px; color: #1a1a1a; }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 20px 24px; border-radius: 12px; border: 1px solid #e0e0e0; }
      .header h1 { font-size: 20px; font-weight: 700; color: #0a0a0a; }
      .header p { font-size: 12px; color: #888; margin-top: 3px; }
      .btn { background: #185FA5; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; }
      .btn:hover { background: #0f4a82; }
      .search-bar { margin-bottom: 20px; }
      .search-bar input { width: 100%; max-width: 400px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; outline: none; }
      .search-bar input:focus { border-color: #185FA5; }
     .cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.player-card { background: white; border-radius: 12px; padding: 20px 24px; border: 1px solid #e8e8e8; }
      .player-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
      .avatar { width: 44px; height: 44px; border-radius: 50%; background: #185FA5; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; }
      .player-name { font-size: 15px; font-weight: 700; color: #0a0a0a; }
      .player-meta { font-size: 12px; color: #999; margin-top: 3px; }
      .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
      .metric-box { background: #f7f9fc; border-radius: 10px; padding: 14px 16px; border: 1px solid #eef1f5; }
      .metric-label { font-size: 11px; color: #999; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
      .metric-value { font-size: 26px; font-weight: 700; color: #0a0a0a; }
      .metric-unit { font-size: 12px; color: #aaa; font-weight: 400; }
      .metric-trend { font-size: 11px; color: #1D9E75; margin-top: 4px; font-weight: 600; }
      .section-label { font-size: 11px; color: #aaa; margin: 4px 0 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
      .session-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-top: 1px solid #f2f2f2; font-size: 13px; color: #666; }
      .session-vals { display: flex; gap: 16px; font-weight: 600; color: #333; }
    </style>
  </head>
  <body>

    <div class="header">
      <div>
        <h1>CBU Hitter Metrics</h1>
        <p>Fall 2025 — 14U Team</p>
      </div>
      <button class="btn" onclick="openForm()">+ Log Session</button>
    </div>

    <div class="search-bar">
  <input id="search-input" type="text" placeholder="Search players..." onkeyup="filterPlayers()" />
</div>

<div id="cards-container" class="cards-container"></div>
<div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:10;"></div>
    <div id="form-popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border-radius:12px; padding:28px; width:340px; z-index:20;">
      <h2 style="font-size:16px; font-weight:700; margin-bottom:20px;">Log Metric Session</h2>

      <label style="font-size:12px; color:#888;">Player Name</label>
      <input id="input-name" type="text" placeholder="e.g. Jake Martinez" style="width:100%; padding:10px; margin:6px 0 14px; border:1px solid #ddd; border-radius:8px; font-size:14px;" />

      <label style="font-size:12px; color:#888;">Peak Exit Velo (mph)</label>
      <input id="input-peak" type="number" placeholder="e.g. 94" style="width:100%; padding:10px; margin:6px 0 14px; border:1px solid #ddd; border-radius:8px; font-size:14px;" />

      <label style="font-size:12px; color:#888;">Avg Exit Velo (mph)</label>
      <input id="input-avg" type="number" placeholder="e.g. 81" style="width:100%; padding:10px; margin:6px 0 14px; border:1px solid #ddd; border-radius:8px; font-size:14px;" />

      <label style="font-size:12px; color:#888;">Launch Angle (degrees)</label>
      <input id="input-angle" type="number" placeholder="e.g. 18" style="width:100%; padding:10px; margin:6px 0 20px; border:1px solid #ddd; border-radius:8px; font-size:14px;" />

      <div style="display:flex; gap:10px;">
        <button onclick="closeForm()" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:8px; background:white; cursor:pointer; font-size:13px;">Cancel</button>
        <button onclick="saveSession()" style="flex:1; padding:10px; border:none; border-radius:8px; background:#185FA5; color:white; cursor:pointer; font-size:13px; font-weight:600;">Save</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = 'https://zwdrqpagnvalwgoolflg.supabase.co';
      const supabaseKey = 'sb_publishable_TcfaAN2Id8Ui4Bx-lF_8Qw_4jRnUDyx';
      const client = supabase.createClient(supabaseUrl, supabaseKey);

      async function saveSession() {
        const name = document.getElementById('input-name').value;
        const peak = document.getElementById('input-peak').value;
        const avg = document.getElementById('input-avg').value;
        const angle = document.getElementById('input-angle').value;

        if (!name || !peak || !avg || !angle) {
          alert('Please fill in all fields.');
          return;
        }

        let { data: existingPlayer } = await client
          .from('players')
          .select('*')
          .eq('name', name)
          .single();

        let playerId;

        if (!existingPlayer) {
          const { data: newPlayer, error: insertError } = await client
            .from('players')
            .insert([{ name: name }])
            .select()
            .single();

          if (insertError) {
            alert('Error creating player: ' + insertError.message);
            return;
          }
          playerId = newPlayer.id;
        } else {
          playerId = existingPlayer.id;
        }

        const { error: sessionError } = await client
          .from('metric_sessions')
          .insert([{
            player_id: playerId,
            peak_exit_velo: parseFloat(peak),
            avg_exit_velo: parseFloat(avg),
            launch_angle: parseFloat(angle)
          }]);

        if (sessionError) {
          alert('Error saving session: ' + sessionError.message);
          return;
        }

        closeForm();
        loadPlayers();
      }

      async function loadPlayers() {
        const { data: players, error } = await client
          .from('players')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.log('Error loading players:', error.message);
          return;
        }

        const existing = document.querySelectorAll('.player-card');
        existing.forEach(card => card.remove());

        window.allPlayers = players;

        for (const player of players) {
          const { data: sessions } = await client
            .from('metric_sessions')
            .select('*')
            .eq('player_id', player.id)
            .order('created_at', { ascending: false });

          const initials = player.name.split(' ').map(w => w[0]).join('').toUpperCase();
          const latest = sessions[0];

          let sessionRows = sessions.map(s => `
            <div class="session-row">
              <span>${new Date(s.created_at).toLocaleDateString()}</span>
              <div class="session-vals">
                <span>Peak: ${s.peak_exit_velo}</span>
                <span>Avg: ${s.avg_exit_velo}</span>
                <span>LA: ${s.launch_angle}°</span>
              </div>
            </div>
          `).join('');

          const card = document.createElement('div');
          card.className = 'player-card';
          card.innerHTML = `
            <div class="player-top">
              <div class="avatar">${initials}</div>
              <div>
                <div class="player-name">${player.name}</div>
                <div class="player-meta">Last session ${new Date(latest.created_at).toLocaleDateString()}</div>
              </div>
            </div>
            <div class="metrics-grid">
              <div class="metric-box">
                <div class="metric-label">Peak Exit Velo</div>
                <div class="metric-value" style="${latest.peak_exit_velo >= 100 ? 'color: #1D9E75;' : ''}">${latest.peak_exit_velo} <span class="metric-unit">mph</span></div>
              </div>
              <div class="metric-box">
                <div class="metric-label">Avg Exit Velo</div>
                <div class="metric-value" style="${latest.avg_exit_velo >= 100 ? 'color: #1D9E75;' : ''}">${latest.avg_exit_velo} <span class="metric-unit">mph</span></div>
              </div>
              <div class="metric-box">
                <div class="metric-label">Launch Angle</div>
                <div class="metric-value">${latest.launch_angle} <span class="metric-unit">deg</span></div>
              </div>
            </div>
            <div class="section-label">Session history</div>
            ${sessionRows}
          `;
          document.getElementById('cards-container').appendChild(card);
        }
      }

      function filterPlayers() {
        const search = document.getElementById('search-input').value.toLowerCase();
        const cards = document.querySelectorAll('.player-card');
        cards.forEach(card => {
          const name = card.querySelector('.player-name').textContent.toLowerCase();
          card.style.display = name.includes(search) ? 'block' : 'none';
        });
      }

      function openForm() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('form-popup').style.display = 'block';
      }

      function closeForm() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('form-popup').style.display = 'none';
      }

      loadPlayers();
    </script>

  </body>
</html>
